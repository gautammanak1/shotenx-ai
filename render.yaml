# Monorepo Blueprint: https://render.com/docs/blueprint-spec
# New → Blueprint → this repo. Replace placeholder URLs in the dashboard after deploy.

version: "1"
services:
  - type: web
    name: shotenx-backend
    rootDir: backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.onrender.com

  - type: web
    name: shotenx-frontend
    rootDir: frontend
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://your-backend.onrender.com
